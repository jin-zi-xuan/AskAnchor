<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AskAnchor Panel</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="ask-anchor-panel-body">
    <main class="ask-anchor-panel">
      <header class="ask-anchor-panel__header">
        <div>
          <strong>AskAnchor</strong>
          <span class="ask-anchor-panel__subtitle">AI reading anchor</span>
        </div>
        <div class="ask-anchor-panel__actions">
          <button id="ask-anchor-hide" class="ask-anchor-text-button" type="button" aria-label="&#38544;&#34255;" title="&#38544;&#34255;">&#38544;&#34255;</button>
          <button id="ask-anchor-close" class="ask-anchor-icon-button" type="button" aria-label="&#20851;&#38381;" title="&#20851;&#38381;">&times;</button>
        </div>
      </header>

      <nav class="ask-anchor-tabs" aria-label="AskAnchor views">
        <button id="ask-anchor-tab-current" class="ask-anchor-tab is-active" type="button">&#24403;&#21069;&#35299;&#37322;</button>
        <button id="ask-anchor-tab-history" class="ask-anchor-tab" type="button">&#21382;&#21490;&#35760;&#24405;</button>
      </nav>

      <section id="ask-anchor-current-view" class="ask-anchor-view">
        <section class="ask-anchor-section">
          <h2>&#36873;&#20013;&#25991;&#26412;</h2>
          <div id="ask-anchor-selected" class="ask-anchor-text-block"></div>
        </section>

        <section class="ask-anchor-section ask-anchor-section--grow">
          <h2>&#35299;&#37322;&#32467;&#26524;</h2>
          <div id="ask-anchor-result" class="ask-anchor-result"></div>
        </section>

        <section class="ask-anchor-section ask-anchor-external-section">
          <h2>&#29992;&#22806;&#37096; AI &#35299;&#37322;</h2>
          <div class="ask-anchor-provider-grid">
            <button class="ask-anchor-provider-button" type="button" data-provider="chatgpt">ChatGPT</button>
            <button class="ask-anchor-provider-button" type="button" data-provider="gemini">Gemini</button>
            <button class="ask-anchor-provider-button" type="button" data-provider="claude">Claude</button>
          </div>
          <div id="ask-anchor-external-status" class="ask-anchor-external-status"></div>
        </section>
      </section>

      <section id="ask-anchor-history-view" class="ask-anchor-view" hidden>
        <div class="ask-anchor-history-header">
          <h2>&#21382;&#21490;&#35760;&#24405;</h2>
          <button id="ask-anchor-clear-history" class="ask-anchor-text-button" type="button">&#28165;&#31354;</button>
        </div>
        <div id="ask-anchor-history-list" class="ask-anchor-history-list"></div>
      </section>

      <footer class="ask-anchor-panel__footer">
        <button id="ask-anchor-return" class="ask-anchor-primary-button" type="button">&#36820;&#22238;&#21407;&#20301;&#32622;</button>
      </footer>
    </main>

    <script src="panel.js"></script>
  </body>
</html>
