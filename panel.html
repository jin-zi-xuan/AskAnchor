<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AskAnchor Panel</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="ask-anchor-panel-body">
    <main class="ask-anchor-panel">
      <header class="ask-anchor-panel__header">
        <strong>AskAnchor</strong>
        <div class="ask-anchor-panel__actions">
          <button id="ask-anchor-hide" class="ask-anchor-text-button" type="button" aria-label="&#38544;&#34255;" title="&#38544;&#34255;">&#38544;&#34255;</button>
          <button id="ask-anchor-close" class="ask-anchor-icon-button" type="button" aria-label="&#20851;&#38381;" title="&#20851;&#38381;">&times;</button>
        </div>
      </header>

      <section class="ask-anchor-section">
        <h2>&#36873;&#20013;&#25991;&#26412;</h2>
        <div id="ask-anchor-selected" class="ask-anchor-text-block"></div>
      </section>

      <section class="ask-anchor-section ask-anchor-section--grow">
        <h2>&#35299;&#37322;&#32467;&#26524;</h2>
        <div id="ask-anchor-result" class="ask-anchor-result"></div>
      </section>

      <footer class="ask-anchor-panel__footer">
        <button id="ask-anchor-return" class="ask-anchor-primary-button" type="button">&#36820;&#22238;&#21407;&#20301;&#32622;</button>
      </footer>
    </main>

    <script src="panel.js"></script>
  </body>
</html>
